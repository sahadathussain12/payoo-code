<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo | login</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind+daidy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- fontWasme -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    * {
         font-family: "Outfit", sans-serif;
    }
</style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
  <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex">
            <div class="logo w-[60px]">
                <img src="assets/logo.png" alt="">
            </div>
            <div class="balance-info">
                <h2 class="text-2xl font-bold">$<span id="balance">50000</span></h2>
                <p class="text-neutral/50">Available Balance</p>

            </div>
        </div>
        <div class="right">
            <a href="/index.html" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
        </div>
    </section>
  </header>
  <section class="w-11/12 mx-auto py-10 space-y-5">
    <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

    <div class="button grid grid-cols-3 gap-3">

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-1.png" alt="">
            <p class="text-neutral/50">Add Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-2.png" alt="">
            <p class="text-neutral/50">Cashout</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-3.png" alt="">
            <p class="text-neutral/50">Transfer Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-4.png" alt="">
            <p class="text-neutral/50">Get Bonus</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-5.png" alt="">
            <p class="text-neutral/50">Pay Bill</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-6.png" alt="">
            <p class="text-neutral/50">Transactions</p>
        </button>
    </div>
  </section>


<section id="add-money"class="w-11/12 mx-auto py-10 space-y-5">
     <h2 class="text-2xl font-bold">add Money</h2>
      <div class="from pt-10 ">
          <div class="card bg-base-100 w-full  shadow  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Select A Bank</label>
               <select id="add-money-bank" class="select input rounded-full bg-base-200 w-full">
                 <option disabled selected>select bank</option>
                 <option>bikash</option>
                 <option>nagot</option>
                 <option>opay</option>
               </select>
             
             </fieldset>


          <label class="label text-neutral font-bold">Bank Account Number</label>
          <input id="add-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01328654064" placeholder="Enter your 11 digit Account Number" />
          <label class="label text-neutral font-bold">Amount to Add</label>
          <input id="add-money-Amount"  type="number" class="input rounded-full bg-base-200 w-full"  placeholder="add amount to withdrow" />
          <label class="label text-neutral font-bold"> pin Number</label>
          <input id="add-money-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 Digit pin Number" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">add-money</button>
        </fieldset>
      </div>
    </div>
    </div>
</section>

  <section id="cashout" class="w-11/12 mx-auto py-5"> 
    <h2 class="text-2xl font-bold">Cashout</h2>
     <div class="from pt-10 ">
          <div class="card bg-base-100 w-full  shadow  rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01328654064" placeholder="Enter your 11 digit Number" />
          <label class="label text-neutral font-bold">Amount</label>
          <input id="cashout-Amount"  type="number" class="input rounded-full bg-base-200 w-full"  placeholder="Enter amount to withdrow" />
          <label class="label text-neutral font-bold">4 Digti pin</label>
          <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 Digit pin" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button id="cashout-btn" class="btn btn-primary rounded-full mt-4">withdrow money</button>
        </fieldset>
      </div>
    </div>
    </div>
  </section>
   <script src="script/machine.js"></script>
   <script src="script/cashout.js"></script>
</body>
</html>
